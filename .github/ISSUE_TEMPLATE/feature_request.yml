name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      description: Describe the pain, not just the feature — who hits this and when?
      placeholder: "As a compliance lead scanning multiple AWS accounts, I can't ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: "Rough sketch. Implementation details optional."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: contribution
    attributes:
      label: Would you be willing to work on this?
      options:
        - "Yes, I'd like to implement it (a maintainer will help scope it)"
        - "Yes, with guidance"
        - "No, just suggesting"
    validations:
      required: true
