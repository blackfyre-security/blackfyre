# Interactive Claude assistant — responds to @claude mentions in issues and PRs.
#
# Auth (pick one):
#   - Repo secret ANTHROPIC_API_KEY (Settings → Secrets and variables → Actions), or
#   - Install the Claude GitHub App (https://github.com/apps/claude) and follow
#     https://github.com/anthropics/claude-code-action for OAuth-based setup.
#
# Invocation is restricted to owners/members/collaborators so arbitrary drive-by
# comments can't spend API credit or drive the agent. Maintainers can also use
# "@claude review" on fork PRs, which claude-pr-review.yml cannot cover.
name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: >-
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # push fix branches when asked to implement changes
      pull-requests: write
      issues: write
      id-token: write
      actions: read          # read CI results on the PR being discussed
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # CLAUDE.md at the repo root gives the agent the project map, verified
          # commands, and the RLS security invariants it must respect.
