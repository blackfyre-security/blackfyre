# Greets first-time issue authors and first-time PR contributors.
#
# Uses pull_request_target so the greeting can be posted on fork PRs (plain
# pull_request gets a read-only token there). SAFE because we never check out
# or execute PR code — the job only posts a comment. Keep it that way: adding
# a checkout step to this workflow would be a security hole.
name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isPR = !!context.payload.pull_request;
            const author = (isPR ? context.payload.pull_request.user : context.payload.issue.user).login;
            if (author.endsWith('[bot]')) return;

            // First interaction? Count the author's prior items of the same kind here.
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} author:${author} type:${isPR ? 'pr' : 'issue'}`,
              per_page: 1
            });
            if (data.total_count > 1) return; // not their first

            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const body = isPR ? [
              `Welcome, @${author} — thanks for your first pull request to Blackfyre! 🎉`,
              '',
              'What happens next:',
              `1. **CI** runs the blocking gates: typecheck, API unit tests, portal lint, and the DCO sign-off check (every commit needs \`git commit -s\` — [how to fix a missing sign-off](${repoUrl}/blob/main/CONTRIBUTING.md#developer-certificate-of-origin-dco)).`,
              '2. **Claude does a first-pass review** — an automated maintainer-configured review that flags correctness/security issues early. It\'s advisory; a human maintainer has the final say.',
              '3. A **maintainer reviews** — usually within a few days. Small, focused PRs merge fastest.',
              '',
              `If this touches tenant data paths, please run the tenant-isolation tests locally (see [CONTRIBUTING.md](${repoUrl}/blob/main/CONTRIBUTING.md)). Questions? Just ask here.`
            ].join('\n') : [
              `Welcome, @${author} — thanks for opening your first issue here! 👋`,
              '',
              'A maintainer will triage it soon (the triage bot may have already added labels).',
              'Meanwhile:',
              '- Bug? Steps to reproduce + logs (redact credentials) speed everything up.',
              `- Want to fix it yourself? We'd love that — [CONTRIBUTING.md](${repoUrl}/blob/main/CONTRIBUTING.md) has the 15-minute local setup, and issues labeled [\`good first issue\`](${repoUrl}/labels/good%20first%20issue) are well-scoped starting points.`,
              `- General question? [GitHub Discussions](${repoUrl}/discussions) is the best place.`
            ].join('\n');

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: isPR ? context.payload.pull_request.number : context.payload.issue.number,
              body
            });
