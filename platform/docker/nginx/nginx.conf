worker_processes auto;
events { worker_connections 1024; }

http {
    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    # Allow large evidence uploads (S3 streaming + JSON payloads)
    client_max_body_size 50M;

    upstream api    { server api:4000;    keepalive 32; }
    upstream admin  { server admin:3003;  keepalive 32; }
    upstream portal { server portal:3001; keepalive 32; }

    log_format main '$remote_addr "$host" "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    # ---------------- API: api.blackfyre.local ----------------
    server {
        listen 80;
        server_name api.blackfyre.local;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 60s;
        }
    }

    # ---------------- Admin: admin.blackfyre.local ----------------
    server {
        listen 80;
        server_name admin.blackfyre.local;

        location / {
            proxy_pass http://admin;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }
    }

    # ---------------- Portal: app.blackfyre.local ----------------
    server {
        listen 80;
        server_name app.blackfyre.local;

        location / {
            proxy_pass http://portal;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }
    }

    # ---------------- Default fallback (catch-all) ----------------
    server {
        listen 80 default_server;
        server_name _;
        return 200 'BLACKFYRE local proxy. Use api.blackfyre.local, admin.blackfyre.local, or app.blackfyre.local.\n';
        add_header Content-Type text/plain;
    }
}
